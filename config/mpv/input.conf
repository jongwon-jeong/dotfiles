LEFT seek -3 exact
RIGHT seek 3 exact
Shift+RIGHT seek 60
Shift+LEFT seek -60
PGUP seek 600
PGDWN seek -600
UP add volume 5
DOWN add volume -5
Alt+1 ab-loop-a
Alt+2 ab-loop-b
Alt+3 ab-loop-a no-osd; ab-loop-b no-osd
l cycle-values loop-file inf no
L cycle-values loop-playlist inf no
Z cycle-values loop-file inf no
Ctrl+z cycle-values loop-playlist inf no
n playlist-next
p playlist-prev
> playlist-next
< playlist-prev
, frame-back-step
. frame-step
Backspace set speed 1.0
[ add speed -0.1
] add speed 0.1
{ set speed 0.5
} set speed 2.0
1 add contrast -1
2 add contrast 1
3 add brightness -1
4 add brightness 1
5 add hue -1
6 add hue 1
7 add saturation -1
8 add saturation 1
- add audio-delay -0.1
= add audio-delay 0.1
+ add gamma 1
_ add gamma -1
w add video-zoom -0.1
e add video-zoom 0.1
E set video-zoom 0
Alt+LEFT add video-pan-x -0.05
Alt+RIGHT add video-pan-x 0.05
Alt+UP add video-pan-y 0.05
Alt+DOWN add video-pan-y -0.05
Ctrl+0 set video-pan-x 0; set video-pan-y 0
z add sub-delay -0.1
x add sub-delay 0.1
r add sub-pos -1
t add sub-pos 1
R add sub-scale -0.1
T add sub-scale 0.1
j cycle sub
J cycle sub down
k cycle audio
K cycle audio down
A cycle-values video-aspect-override "-1" "16:9" "4:3" "2.35:1" "1:1"
F1 set video-aspect-override "-1"
F2 set video-aspect-override "16:9"
m cycle mute
f cycle fullscreen
o cycle osd-level
i show-text "${time-pos} / ${duration}"
d cycle deinterlace
Shift+v cycle-values vf "hflip" ""
b add video-rotate 90
c add video-rotate 270
v add video-rotate 180
q set video-rotate 0
s ignore
Ctrl+Shift+s ignore
Ctrl+Alt+s ignore
