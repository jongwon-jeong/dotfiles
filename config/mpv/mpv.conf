# hwdec=auto-safe
cache=auto
demuxer-max-bytes=64MiB
demuxer-max-back-bytes=32MiB
resume-playback=no
watch-later-directory=/dev/null
keep-open=always
save-position-on-quit=no
write-filename-in-watch-later-config=no
autocreate-playlist=filter
directory-mode=ignore
directory-filter-types=video,audio

# YouTube-like subtitle readability: white text over a black per-line box.
sub-ass-override=force
sub-border-style=opaque-box
sub-border-color=0.0/0.0/0.0/0.70
sub-border-size=0.7
sub-font-size=46
sub-back-color=0.0/0.0/0.0/0
sub-shadow-offset=0
sub-shadow-color=0.0/0.0/0.0/0
sub-color=1.0/1.0/1.0/1.0

# Outline-only alternative.
# sub-ass-override=force
# sub-back-color=0.0/0.0/0.0/0.55
